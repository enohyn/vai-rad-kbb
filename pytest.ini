[pytest]
# Point Django at its settings module.
DJANGO_SETTINGS_MODULE = config.settings
# Where the tests physically live now (sibling folder at workspace root).
testpaths = ../kbb-tests
# Keep the backend project root on sys.path so `from apps...` resolves.
pythonpath = .
# Standard pytest discovery for our test module naming.
python_files = tests.py test_*.py *_tests.py
addopts = -v --reuse-db