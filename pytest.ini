[pytest]
# Point Django at its settings module.
DJANGO_SETTINGS_MODULE = config.settings
# Tests live inside the repo in the tests/ folder.
testpaths = tests
# Keep the backend project root on sys.path so `from apps...` resolves.
pythonpath = .
# Standard pytest discovery for our test module naming.
python_files = tests.py test_*.py *_tests.py
addopts = -v --reuse-db