# Render.com Blueprint — auto-deploys backend from GitHub
# Docs: https://render.com/docs/blueprint-spec
# After pushing this file, go to render.com → New → Blueprint → select this repo.

databases:
  # Free Postgres (expires after 90 days on free tier; fine for a demo).
  # If you'd rather use SQLite, delete this block and set DATABASE_URL in the
  # web service Environment tab to: sqlite:///db.sqlite3
  - name: kanban-db
    plan: free
    databaseName: kanban
    user: kanban_user

services:
  - type: web
    name: vai-rad-kbb
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind=0.0.0.0:$PORT --workers=3"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000
      - key: DATABASE_URL
        fromDatabase:
          name: kanban-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "3"
    healthCheckPath: /api/health/
    autoDeploy: true